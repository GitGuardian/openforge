repos:
  - repo: https://github.com/gitguardian/ggshield
    rev: v1.46.0
    hooks:
      - id: ggshield
        language_version: python3
        stages: [pre-commit]
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.1
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: pyright
        name: pyright
        entry: bash -c 'cd cli && uv run pyright src/openforge/'
        language: system
        types: [python]
        files: ^cli/
        pass_filenames: false
      - id: bandit
        name: bandit
        entry: bash -c 'cd cli && uv run bandit -c pyproject.toml -r src/openforge/'
        language: system
        types: [python]
        files: ^cli/
        pass_filenames: false
      - id: tests
        name: pytest
        entry: bash -c 'cd cli && uv run pytest tests/ -x -q --cov --cov-fail-under=90 -m "not slow"'
        language: system
        pass_filenames: false
        always_run: true
      - id: tests-forge
        name: bun test (forge)
        entry: bash -c 'cd forge && bash scripts/check-coverage.sh 90'
        language: system
        pass_filenames: false
        always_run: true
      - id: tests-forge-integration
        name: bun test integration (forge)
        entry: bash -c 'if curl -sf http://localhost:3000/health >/dev/null 2>&1; then cd forge && bun test tests/integration/ 2>&1 | tail -1; else echo "Skipped (Forge not running)"; fi'
        language: system
        pass_filenames: false
        always_run: true
      - id: typecheck-forge
        name: typecheck (forge)
        entry: bash -c 'cd forge && bun run typecheck'
        language: system
        types: [ts]
        files: ^forge/
        pass_filenames: false
